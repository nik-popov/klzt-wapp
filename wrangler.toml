name = "klzt"
main = "src/worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets binding (built Vite SPA). The Worker falls through to
# env.ASSETS.fetch(request) for anything that isn't /api/*.
[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
APP_ENV = "dev"

# AUTH_TOKEN is provided via `wrangler secret put AUTH_TOKEN` in prod,
# or via .dev.vars locally. See .dev.vars.example.

[[d1_databases]]
binding = "DB"
database_name = "klzt"
database_id = "f31f81b0-639a-45fb-bfa8-2f4df5bf09dc"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "klzt-bucket"
preview_bucket_name = "klzt-bucket-dev"

# Magic Fix uses Gemini 2.5 Flash Image ("Nano Banana"). Set the API
# key with `wrangler secret put GEMINI_API_KEY` for prod, or in
# .dev.vars for `wrangler dev`. Override the model name by setting
# GEMINI_MODEL (default: gemini-2.5-flash-image).
